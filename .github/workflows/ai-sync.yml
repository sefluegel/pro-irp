# File: .github/workflows/ai-sync.yml

name: 🤖 Sync ai-code → staging

on:
  workflow_dispatch:

jobs:
  ai_sync:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the staging branch
      - name: Checkout staging branch
        uses: actions/checkout@v3
        with:
          ref: staging
          token: ${{ secrets.MACHINE_USER_PAT }}

      # 2. Fetch ai-code branch from the same repo
      - name: Fetch ai-code branch
        run: |
          git fetch origin ai-code

      # 3. Merge ai-code into staging, allowing unrelated histories
      - name: Merge ai-code into staging (allow unrelated histories)
        run: |
          git merge --no-ff origin/ai-code --allow-unrelated-histories -m "chore: merge ai-code → staging"

      # 4. Push the merged result back to staging
      - name: Push to staging
        run: |
          git push https://${{ secrets.MACHINE_USER_PAT }}@github.com/your-username/pro-irp.git staging

      # 5. Success confirmation
      - name: Success
        run: echo "✅ ai-code has been successfully merged into staging"
