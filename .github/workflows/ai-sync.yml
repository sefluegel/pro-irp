# .github/workflows/ai-sync.yml
name: 🤖 Sync ai-code → staging

on:
  push:
    branches:
      - ai-code
  workflow_dispatch:

jobs:
  ai_sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout staging
        uses: actions/checkout@v3
        with:
          ref: staging
          token: ${{ secrets.MACHINE_USER_PAT }}

      - name: Fetch ai-code
        run: |
          git fetch origin ai-code

      - name: Reset staging to ai-code
        run: |
          git reset --hard origin/ai-code

      - name: Force-push staging
        run: |
          git push --force https://${{ secrets.MACHINE_USER_PAT }}@github.com/your-username/pro-irp.git staging

      - name: Done
        run: echo "✅ staging now exactly matches ai-code"
